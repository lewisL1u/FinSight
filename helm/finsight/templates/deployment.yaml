apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "finsight.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "finsight.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "finsight.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "finsight.fullname" . }}
    spec:
      containers:
        - name: finsight
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8501
          env:
            - name: SNOWFLAKE_ROLE
              value: {{ .Values.snowflake.role | quote }}
            - name: SNOWFLAKE_WAREHOUSE
              value: {{ .Values.snowflake.warehouse | quote }}
            - name: SNOWFLAKE_DATABASE
              value: {{ .Values.snowflake.database | quote }}
            - name: SNOWFLAKE_SCHEMA
              value: {{ .Values.snowflake.schema | quote }}
            - name: CORTEX_SEARCH_SERVICE
              value: {{ .Values.cortex.searchService | quote }}
            - name: CORTEX_LLM_MODEL
              value: {{ .Values.cortex.llmModel | quote }}
            - name: CORTEX_TOP_K
              value: {{ .Values.cortex.topK | quote }}
            - name: CHUNK_SIZE
              value: {{ .Values.chunking.chunkSize | quote }}
            - name: CHUNK_OVERLAP
              value: {{ .Values.chunking.chunkOverlap | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.snowflake.existingSecret }}
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
