replicaCount: 1

image:
  repository: your-registry/finsight
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8501

ingress:
  enabled: false
  className: "nginx"
  host: finsight.example.com
  tls: false
  tlsSecretName: ""

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

snowflake:
  existingSecret: finsight-snowflake-secret   # K8s secret with SNOWFLAKE_ACCOUNT/USER/PASSWORD
  role: ACCOUNTADMIN
  warehouse: FINSIGHT_WH
  database: FINSIGHT_DB
  schema: FINSIGHT_SCHEMA

cortex:
  searchService: FINSIGHT_SEARCH_SERVICE
  llmModel: mistral-large2
  topK: 5

chunking:
  chunkSize: 500
  chunkOverlap: 50
