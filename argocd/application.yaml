apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finsight
  namespace: argocd                  # ArgoCD's own namespace
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/your-org/FinSight.git   # replace with your repo
    targetRevision: main
    path: helm/finsight
    helm:
      valueFiles:
        - values.yaml
      # Override specific values per environment:
      # parameters:
      #   - name: image.tag
      #     value: "1.2.3"
      #   - name: replicaCount
      #     value: "2"

  destination:
    server: https://kubernetes.default.svc
    namespace: finsight

  syncPolicy:
    automated:
      prune: true          # Delete resources removed from Git
      selfHeal: true       # Re-sync if cluster drifts from Git state
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
