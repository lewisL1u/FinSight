apiVersion: v1
kind: Secret
metadata:
  name: finsight-snowflake-secret
  namespace: finsight
type: Opaque
# Values must be base64-encoded: echo -n 'value' | base64
data:
  SNOWFLAKE_ACCOUNT: <base64_encoded_account>
  SNOWFLAKE_USER: <base64_encoded_user>
  SNOWFLAKE_PASSWORD: <base64_encoded_password>
